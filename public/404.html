<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>AIVY - AI Learning Workspace</title>
    <script>
        // GitHub Pages SPA redirect trick
        // Stores the full path in sessionStorage then redirects to root
        var l = window.location;
        sessionStorage.redirect = l.pathname + l.search + l.hash;
        l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/AIVY_V1/');
    </script>
</head>

<body></body>

</html>
