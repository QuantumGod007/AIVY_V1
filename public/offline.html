<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#7c3aed" />
  <title>AIVY — You're Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 40px rgba(124,58,237,0.4);
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.75rem; color: #fff; }
    p  { color: #94a3b8; font-size: 1rem; line-height: 1.6; max-width: 380px; margin-bottom: 2rem; }
    button {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="icon">🧠</div>
  <h1>You're Offline</h1>
  <p>
    AIVY needs an internet connection to generate AI content and sync your progress.
    Your previously loaded pages are still available.
  </p>
  <button onclick="window.location.reload()">Try Again</button>
  <p class="hint">Your saved flashcards and study plans are still accessible when you reconnect.</p>
</body>
</html>
